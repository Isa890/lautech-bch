<script>
    const allItems = []
    const addMessage = () => {
        // alert ('yes')
        const itemInput = document.getElementById('userMessage').value;
        if(itemInput.trim ==''){
            alert('input cannot be empty');
            } else {
                console.log(itemInput);
                allItems.push(itemInput)
                console.log(allItems);
                document.getElementById('userMessage').value =''
                showItems()
            }
        }
    
        const deleteItem = (index) => {
            // alert('Yes')
            allItems.splice(index, 1)
            showItems()
        }

    function showItems(){
        show.innerHTML = ''
                for(let i=0; i<allItems.length; i++) {
                    show.innerHTML += `<p>${i+0}. ${allItems[i]} <button onclick="deleteItem(${i})" class="btn btn-danger">Delete item</button> <button onclick="editItem(${i})" class="btn btn-warning">Edit Item</button></p>`
                }
            }
</script>
